startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      apiUrl:
        type: string
        description: "NetworkLytics API URL (default: https://networklytics.net)"
        default: "https://networklytics.net"
      apiKey:
        type: string
        description: "NetworkLytics API key — required for private analysis access. Get yours at https://networklytics.net/accounts/settings/"
    required: []
  commandFunction: |-
    (config) => ({
      command: "uvx",
      args: ["networklytics-mcp"],
      env: {
        NETWORKLYTICS_API_URL: config.apiUrl || "https://networklytics.net",
        ...(config.apiKey ? { NETWORKLYTICS_API_KEY: config.apiKey } : {})
      }
    })
